<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OmniGemLevel Resource Banner</title>
  <link rel="stylesheet" href="resource-banner.css">
</head>
<body>
  <main class="resource-banner" aria-label="OmniGemLevel by SalyVn">
    <div class="grid-texture"></div>
    <div class="frame-lines"></div>

    <section class="brand-copy">
      <div class="brand-mark"><span></span></div>
      <h1>OmniGemLevel</h1>
      <p>BY SALYVN</p>
    </section>

    <section class="gem-stage" aria-hidden="true">
      <div class="track track-back"></div>
      <div class="track track-front"></div>

      <div class="gem gem-violet gem-small pos-one"><span></span></div>
      <div class="gem gem-blue gem-medium pos-two"><span></span></div>
      <div class="gem gem-green gem-large pos-three"><span></span></div>
      <div class="gem gem-gold gem-medium pos-four"><span></span></div>
      <div class="gem gem-red gem-small pos-five"><span></span></div>

      <div class="level-line line-one"></div>
      <div class="level-line line-two"></div>
      <div class="level-line line-three"></div>
      <div class="level-line line-four"></div>
    </section>
  </main>
</body>
</html>
